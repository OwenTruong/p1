services:
  backend:
    build: .
    container_name: backend-server
    env_file: '.env'
    ports:
      - '${BACKEND_PORT}:${BACKEND_PORT}'
    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      BACKEND_PORT: ${BACKEND_PORT}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
    networks:
      - app_network

networks:
  app_network:
    external: true
