services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: python_web_api
    ports:
      - '80:80'
    environment:
      - DB_HOST
      - DB_NAME
      - DB_USER
      - DB_PASSWORD

  db:
    image: postgres:15-alpine
    container_name: postgres_backend
    environment:
      DB_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
