services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: python_web_api
    ports:
      - '80:80'
    environment:
      - DB_HOST
      - DB_NAME
      - DB_USER
      - DB_PASSWORD
      - FASTAPI_PORT
      - JWT_SECRET_KEY
      - JWT_ALGORITHM

  db:
    image: postgres:15-alpine
    container_name: postgres_backend
    environment:
      - DB_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
