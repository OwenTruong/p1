<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="/static/js/register.js"></script>
    <title>Register</title>
  </head>
  {% from './components/header.html' import header %}
  <!-- prettier-ignore -->
  {% from './components/footer.html' import footer %}
  <body class="min-h-screen flex flex-col bg-gray-50">
    {{ header() }}
    <main class="grow flex justify-center items-center">
      <section
        class="bg-white flex flex-col px-8 py-4 items-center border border-gray-200 rounded-xl"
      >
        <h2 class="text-2xl text-indigo-700 mb-4">Register</h2>
        <form action="/api/auth/register" method="post" id="form-register">
          <div class="mb-4">
            <label for="username" class="hidden">Username</label>
            <input
              id="username"
              type="text"
              placeholder="Username"
              class="border-b border-b-gray-200 rounded-t bg-gray-50 px-4 py-1 outline-0 focus:outline-none focus:border-b-indigo-700"
            />
          </div>
          <div class="mb-4">
            <label for="password" class="hidden">Password</label>
            <input
              id="password"
              type="password"
              placeholder="Password"
              class="border-b border-b-gray-200 rounded-t bg-gray-50 px-4 py-1 focus:outline-none focus:border-b-indigo-700"
            />
          </div>
          <div class="mb-8">
            <label for="confirm-password" class="hidden"
              >Confirm Password</label
            >
            <input
              id="confirm-password"
              type="password"
              placeholder="Confirm Password"
              class="border-b border-b-gray-200 rounded-t bg-gray-50 px-4 py-1 focus:outline-none focus:border-b-indigo-700"
            />
          </div>
          <div class="flex justify-center items-center">
            <button
              type="submit"
              class="border-gray-200 rounded bg-indigo-600 text-white px-4 py-1"
            >
              Submit
            </button>
          </div>
        </form>
        <a
          href="/login"
          class="text-xs mt-2 text-gray-400 hover:underline underline-offset-2 decoration-gray-400"
          >Already have an account?</a
        >
      </section>
    </main>
    {{ footer() }}
  </body>
</html>
