services:
  db:
    image: postgres:15-alpine
    container_name: p1_fastapi_db
    env_file: '.env'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin_user -d metrics_db']
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
